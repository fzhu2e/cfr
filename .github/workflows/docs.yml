name: Deploy Documentation

on:
  push:
    branches: [main, v2024, v2026]
    paths:
      - 'docsrc/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install sphinx sphinx-book-theme sphinx-copybutton sphinx-design
          pip install nbsphinx ipykernel pandoc
          pip install -e .

      - name: Build v2024 docs
        run: sphinx-build docsrc/v2024 _site/v2024

      - name: Build v2026 docs
        run: sphinx-build docsrc/v2026 _site/v2026

      - name: Assemble site
        run: |
          cp docsrc/landing/index.html _site/index.html
          cp docsrc/versions.json _site/versions.json
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
