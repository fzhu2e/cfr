site_name: "cfr: a Python package for Climate Field Reconstruction"
site_description: "A Python package for Climate Field Reconstruction"
site_url: https://fzhu2e.github.io/cfr
repo_url: https://github.com/fzhu2e/cfr
repo_name: fzhu2e/cfr

copyright: Copyright &copy; 2026 Feng Zhu, Julien Emile-Geay.

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
  font:
    text: Source Sans Pro
    code: Source Code Pro
  logo: assets/cfr-logo.jpg
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocs-jupyter
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            docstring_style: numpy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Installation: installation.md
    - pseudoPAGES2k: pp2k.md
    - Climate: climate.md
    - Proxy: proxy.md
    - PSM: psm.md
    - LMR: lmr.md
    - GraphEM: graphem.md
  - API Reference:
    - Overview: api/index.md
    - Proxy: api/proxy.md
    - Climate: api/climate.md
    - Timeseries: api/timeseries.md
    - PSM: api/psm.md
    - Data Assimilation: api/da.md
    - Reconstruction: api/reconstruction.md
  - Notebooks:
    - Climate:
      - IO: notebooks/climate-io.ipynb
      - Operations: notebooks/climate-ops.ipynb
    - Proxy:
      - IO: notebooks/proxy-io.ipynb
      - Operations: notebooks/proxy-ops.ipynb
      - Analysis: notebooks/proxy-analysis.ipynb
      - Composites: notebooks/proxy-composites.ipynb
      - Duplicates: notebooks/proxy-dups.ipynb
      - DOD2k: notebooks/proxy-load-dod2k.ipynb
    - PSM:
      - Linear: notebooks/psm-linear.ipynb
      - Bilinear: notebooks/psm-bilinear.ipynb
      - Ice d18O: notebooks/psm-ice-d18O.ipynb
      - Lake Varve Thickness: notebooks/psm-lake-VarveThickness.ipynb
      - Coral SrCa: notebooks/psm-coral-SrCa.ipynb
      - Coral d18O: notebooks/psm-coral-d18O.ipynb
      - Tree TRW: notebooks/psm-tree-TRW.ipynb
    - pseudoPAGES2k:
      - Load & Visualize: notebooks/pp2k-pdb-load-viz.ipynb
      - Filter: notebooks/pp2k-pdb-filter.ipynb
      - Dashboards: notebooks/pp2k-dashboards.ipynb
      - PPE PDA: notebooks/pp2k-ppe-pda.ipynb
      - PPE GraphEM: notebooks/pp2k-ppe-graphem.ipynb
    - LMR:
      - Real PAGES2k: notebooks/lmr-real-pages2k.ipynb
      - Independent Verification: notebooks/lmr-real-pages2k-indpdt-verif.ipynb
      - Assimilation No Calib: notebooks/lmr-assim-no-calib.ipynb
      - Reconstruct Precipitation: notebooks/lmr-recon-pr.ipynb
      - CLI: notebooks/lmr-cli.ipynb
    - GraphEM:
      - Primer: notebooks/graphem-primer.ipynb
      - Real PAGES2k: notebooks/graphem-real-pages2k.ipynb
      - CLI: notebooks/graphem-cli.ipynb
  - Contributing:
    - Overview: contributing.md
    - Working with the Codebase: working-with-codebase.md
    - Updating Docs: updating-docs.md
